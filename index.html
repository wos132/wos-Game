<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Moje Gry</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap">
  <style>
    :root {
      --bg: #0f0f1a;
      --card: #1a1a2e;
      --accent: #00d4ff;
      --text: #e0e0ff;
      --shadow: 0 8px 32px rgba(0,0,0,0.5);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Roboto', sans-serif;
      min-height: 100vh;
      padding: 20px;
    }

    header {
      text-align: center;
      margin: 0 0 40px;
      padding: 20px;
    }

    h1 {
      font-size: 3rem;
      background: linear-gradient(90deg, #00d4ff, #ff00aa);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 12px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
    }

    .card {
      background: var(--card);
      border-radius: 16px;
      overflow: hidden;
      transition: all 0.3s ease;
      box-shadow: var(--shadow);
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      border: 1px solid rgba(0,212,255,0.15);
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 200px; /* żeby karty miały podobną wysokość */
      padding: 30px 20px;
      text-align: center;
    }

    .card:hover {
      transform: translateY(-12px);
      box-shadow: 0 20px 50px rgba(0,212,255,0.3);
      border-color: var(--accent);
    }

    .card h2 {
      font-size: 1.5rem;
      margin-bottom: 12px;
      color: var(--accent);
    }

    .card p {
      font-size: 0.95rem;
      opacity: 0.85;
      line-height: 1.5;
    }

    .loading {
      text-align: center;
      font-size: 1.3rem;
      margin: 100px 0;
      color: var(--accent);
    }

    @media (max-width: 600px) {
      h1 { font-size: 2.4rem; }
      .grid { gap: 16px; }
      .card { min-height: 160px; padding: 20px 15px; }
    }
  </style>
</head>
<body>

<header>
  <h1>Moje Gry</h1>
</header>

<div class="container">
  <div id="loading" class="loading">Ładowanie gier...</div>
  <div id="games-grid" class="grid" style="display:none"></div>
</div>

<script>
function loadGames() {
  const loading = document.getElementById('loading');
  const grid = document.getElementById('games-grid');

  // Dane gier – bez zdjęć
  const games = [
    {
      title: "Atomowa_Krowa",
      description: "Krowa VS Bomby Atomowe",
      url: ""
    }
  ];

  grid.innerHTML = '';

  games.forEach(game => {
    const card = document.createElement('a');
    card.href = game.url;
    card.className = 'card';
    card.innerHTML = `
      <h2>${game.title}</h2>
      <p>${game.description || 'Prosta gra przeglądarkowa'}</p>
    `;
    grid.appendChild(card);
  });

  loading.style.display = 'none';
  grid.style.display = 'grid';
}

loadGames();
</script>

</body>
</html>
